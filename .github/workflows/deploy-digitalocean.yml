# Triggers a new DigitalOcean App Platform deployment (pulls latest commit from GitHub).
# One-time setup: add repo secrets DIGITALOCEAN_ACCESS_TOKEN and DIGITALOCEAN_APP_ID
# (see deployments/digitalocean/DEPLOY_SIMPLE.md).

name: Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: digitalocean-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Create deployment (force rebuild)
        run: doctl apps create-deployment "${{ secrets.DIGITALOCEAN_APP_ID }}" --force-rebuild
