name: __APP_NAME__
region: __REGION__
static_sites:
  - name: web
    github:
      repo: __GITHUB_REPO__
      branch: __GITHUB_BRANCH__
      deploy_on_push: true
    environment_slug: node-js
    source_dir: ./
    output_dir: dist
    build_command: npm install && npm run build
    routes:
      - path: /
    envs:
      - key: VITE_AFTERSHIP_API_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_AFTERSHIP_API_KEY__"
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_URL__"
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_ANON_KEY__"
      - key: VITE_METABASE_SITE_URL
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_METABASE_SITE_URL__"
      - key: VITE_METABASE_SECRET_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_METABASE_SECRET_KEY__"
      - key: VITE_METABASE_QUESTION_ID
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_METABASE_QUESTION_ID__"
      - key: VITE_SERPER_API_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SERPER_API_KEY__"

  - name: scanner
    github:
      repo: __GITHUB_REPO__
      branch: __GITHUB_BRANCH__
      deploy_on_push: true
    environment_slug: node-js
    source_dir: scanner-app
    output_dir: dist
    build_command: npm install && npm run build
    routes:
      - path: /scanner
    envs:
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_URL__"
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_ANON_KEY__"

  - name: wire-scanner
    github:
      repo: __GITHUB_REPO__
      branch: __GITHUB_BRANCH__
      deploy_on_push: true
    environment_slug: node-js
    source_dir: wire-scanner-app
    output_dir: dist
    build_command: npm install && npm run build
    routes:
      - path: /wire-scanner
    envs:
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_URL__"
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "__VITE_SUPABASE_ANON_KEY__"

